services:
  devcontainer:
    image: firstdraft/appdev-rails-8-phase2
    volumes:
      - ../..:/workspaces:cached
    network_mode: service:db
    command: sleep infinity

  db:
    image: postgres:18.4
    restart: unless-stopped
    volumes:
      # PG 18's image moved its VOLUME from /var/lib/postgresql/data to
      # /var/lib/postgresql. The renamed volume keeps 16-era data out of the
      # 18 server — rebuilt codespaces initdb fresh (bin/setup + rake sample_data).
      - postgres-18-data:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: student
      POSTGRES_DB: postgres
  
  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis-data:/var/lib/redis/data

volumes:
  postgres-18-data:
  redis-data:
